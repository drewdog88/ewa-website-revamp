name: Restore DB to Safe Branch

# Manually-triggered restore. Decrypts a chosen encrypted backup and restores it
# into a BRAND-NEW Neon branch — never the production branch. You inspect that
# branch, and only if it looks right do you promote it in the Neon console yourself.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   AGE_PRIVATE_KEY   - age identity (AGE-SECRET-KEY-...) matching the backup's public key
#   NEON_API_KEY      - Neon API key (neonctl reads this env var)
#   NEON_PROJECT_ID   - Neon project id that holds the database
#
# See BACKUP_AND_RESTORE.md for one-time setup.

on:
  workflow_dispatch:
    inputs:
      backup_file:
        description: "Path to the encrypted backup (e.g. backups/ewa-2026-07-05.sql.gz.age). Leave blank for the newest."
        required: false
        default: ""
      branch_name:
        description: "Name for the NEW Neon branch to restore into (a safe scratch branch)."
        required: true
        default: "restore-scratch"

permissions:
  contents: read

jobs:
  restore:
    runs-on: ubuntu-latest
    env:
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Guard against unsafe branch names
        env:
          BRANCH_NAME: ${{ github.event.inputs.branch_name }}
        run: |
          set -euo pipefail
          case "$BRANCH_NAME" in
            ""|main|master|production|prod|primary|default)
              echo "::error::Refusing to restore into '$BRANCH_NAME'. Choose a fresh scratch branch name." >&2
              exit 1 ;;
          esac
          echo "Target branch: $BRANCH_NAME"

      - name: Install pg client 17, age, neonctl
        run: |
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/pgdg.gpg
          echo "deb [signed-by=/usr/share/keyrings/pgdg.gpg] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17 age
          npm install -g neonctl

      - name: Decrypt the chosen backup
        env:
          AGE_PRIVATE_KEY: ${{ secrets.AGE_PRIVATE_KEY }}
          BACKUP_FILE: ${{ github.event.inputs.backup_file }}
        run: |
          set -euo pipefail
          FILE="$BACKUP_FILE"
          if [ -z "$FILE" ]; then
            FILE="$(ls -1t backups/ewa-*.sql.gz.age | head -n1)"
            echo "No file given; using newest: $FILE"
          fi
          if [ ! -f "$FILE" ]; then
            echo "::error::Backup file '$FILE' not found." >&2
            exit 1
          fi
          printf '%s' "$AGE_PRIVATE_KEY" > /tmp/age.key
          chmod 600 /tmp/age.key
          age -d -i /tmp/age.key "$FILE" | gunzip > /tmp/restore.sql
          rm -f /tmp/age.key
          echo "Decrypted $(wc -l < /tmp/restore.sql) lines to /tmp/restore.sql"

      - name: Create fresh Neon branch and restore
        env:
          BRANCH_NAME: ${{ github.event.inputs.branch_name }}
        run: |
          set -euo pipefail
          neonctl branches create \
            --project-id "$NEON_PROJECT_ID" \
            --name "$BRANCH_NAME" \
            --output json > /tmp/branch.json
          RESTORE_URL="$(neonctl connection-string "$BRANCH_NAME" \
            --project-id "$NEON_PROJECT_ID" --output json | tr -d '"')"
          if [ -z "$RESTORE_URL" ]; then
            echo "::error::Could not obtain connection string for branch '$BRANCH_NAME'." >&2
            exit 1
          fi
          psql "$RESTORE_URL" -v ON_ERROR_STOP=1 -f /tmp/restore.sql
          echo "::notice::Restored into Neon branch '$BRANCH_NAME'. Inspect it in the Neon console before promoting."
